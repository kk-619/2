<!DOCTYPE html>
<html>
<head>
    <title>CSS Stylesheet Example</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <style>
        p {
            color: red;
        }
    </style>
</head>
<body>
    <h1 style="color: blue;">This is a heading with inline styles</h1>
    <p>This is a paragraph with internal styles.</p>
    <p class="external">This is a paragraph with external styles.</p>
</body>
</html>
